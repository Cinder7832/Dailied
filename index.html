    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-title" content="Dailied" />

    <link rel="apple-touch-icon" href="apple-touch-icon.png" />
    <title>Dailied</title>
    <script>
      (function () {
        var lightBackground = '#E9E1CF';
        var darkBackground = '#211E1A';
        var themeMode = 'system';

        try {
          var storedTheme = window.localStorage.getItem('dailied.themeMode');
          if (storedTheme === 'light' || storedTheme === 'dark' || storedTheme === 'system') {
            themeMode = storedTheme;
          }
        } catch (error) {
          themeMode = 'system';
        }

        var systemIsDark = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches;
        var themeIsDark = themeMode === 'dark' || (themeMode === 'system' && systemIsDark);
        var launchBackground = themeIsDark ? darkBackground : lightBackground;

        document.documentElement.style.setProperty('--dailied-launch-background', launchBackground);
        document.documentElement.style.colorScheme = themeIsDark ? 'dark' : 'light';
        document.querySelector('meta[name="theme-color"]').setAttribute('content', launchBackground);
      })();
    </script>
    <!-- The `react-native-web` recommended style reset: https://necolas.github.io/react-native-web/docs/setup/#root-element -->
    <style id="expo-reset">
      :root {
        --dailied-launch-background: #e9e1cf;
      }
      /* These styles make the body full-height */
      html,
      body {
        height: 100%;
        background: var(--dailied-launch-background);
      }
      /* These styles disable body scrolling if you are using <ScrollView> */
      body {
        overflow: hidden;
      }
      /* These styles make the root element full-height */
      #root {
        display: flex;
        height: 100%;
        flex: 1;
        background: var(--dailied-launch-background);
      }
      input,
      textarea {
        outline: none;
      }
      input:focus,
      textarea:focus {
        outline: none;
        box-shadow: none;
      }
    </style>

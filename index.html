<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta httpEquiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no, viewport-fit=cover" />
    <meta name="theme-color" content="#E9E1CF" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-title" content="Dailied" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <link rel="manifest" href="manifest.json" />
    <link rel="apple-touch-icon" href="apple-touch-icon.png" />
    <title>Dailied</title>
    <script>
      (function () {
        var lightBackground = '#E9E1CF';
        var darkBackground = '#211E1A';
        var themeMode = 'system';
        var activityParams = new URLSearchParams(window.location.search);
        var isDiscordActivity = activityParams.get('discord_activity') === '1'
          || activityParams.has('frame_id')
          || activityParams.has('instance_id')
          || activityParams.has('platform')
          || activityParams.has('location_id')
          || window.location.hash.indexOf('discord_activity=1') !== -1;

        if (isDiscordActivity) {
          document.documentElement.classList.add('discord-activity');
        }

        try {
          var storedTheme = window.localStorage.getItem('dailied.themeMode');
          if (storedTheme === 'light' || storedTheme === 'dark' || storedTheme === 'system') {
            themeMode = storedTheme;
          }
        } catch (error) {
          themeMode = 'system';
        }

        var systemIsDark = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches;
        var themeIsDark = themeMode === 'dark' || (themeMode === 'system' && systemIsDark);
        var launchBackground = themeIsDark ? darkBackground : lightBackground;

        document.documentElement.style.setProperty('--dailied-launch-background', launchBackground);
        document.documentElement.style.colorScheme = themeIsDark ? 'dark' : 'light';
        document.querySelector('meta[name="theme-color"]').setAttribute('content', launchBackground);
      })();
    </script>
    <!-- The `react-native-web` recommended style reset: https://necolas.github.io/react-native-web/docs/setup/#root-element -->
    <style id="expo-reset">
      :root {
        --dailied-launch-background: #e9e1cf;
        --dailied-safe-area-top: var(--discord-safe-area-inset-top, env(safe-area-inset-top, 0px));
        --dailied-safe-area-right: var(--discord-safe-area-inset-right, env(safe-area-inset-right, 0px));
        --dailied-safe-area-bottom: var(--discord-safe-area-inset-bottom, env(safe-area-inset-bottom, 0px));
        --dailied-safe-area-left: var(--discord-safe-area-inset-left, env(safe-area-inset-left, 0px));
      }
      /* These styles make the body full-height */
      html,
      body {
        height: 100%;
        background: var(--dailied-launch-background);
      }
      /* These styles disable body scrolling if you are using <ScrollView> */
      body {
        overflow: hidden;
      }
      html.discord-activity body {
        box-sizing: border-box;
        padding-top: var(--dailied-safe-area-top);
        padding-right: var(--dailied-safe-area-right);
        padding-bottom: var(--dailied-safe-area-bottom);
        padding-left: var(--dailied-safe-area-left);
      }
      /* These styles make the root element full-height */
      #root {
        display: flex;
        height: 100%;
        flex: 1;
        background: var(--dailied-launch-background);
      }
      input,
      textarea {
        outline: none;
      }
      input:focus,
      textarea:focus {
        outline: none;
        box-shadow: none;
      }
    </style>
  <link rel="icon" href="favicon.ico"/></head>
